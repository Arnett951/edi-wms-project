name: CR Gate 2 Dispatch

# Triggered remotely by the deployed API (api/main.py's merge/rollback
# endpoints) when it detects it has no local git repo of its own -- the
# App Service calls the GitHub API to fire this workflow_dispatch instead
# of holding push credentials itself. See pipeline/gate2_dispatch.py.
#
# Checkout uses a PAT (secrets.GH_PAT) instead of the default GITHUB_TOKEN:
# pushes made with the default token don't trigger other push-based workflows
# (GitHub's loop-prevention guard), which silently skipped the deploy
# workflows after a merge. A PAT with Contents: Read and write avoids that.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'merge or rollback'
        required: true
        type: choice
        options:
          - merge
          - rollback
      cr_number:
        description: 'CR number, e.g. 4'
        required: true
      approver:
        description: 'Name of the approver'
        required: false
        default: 'GitHub Actions'

jobs:
  gate2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ODBC Driver 18 for SQL Server
        run: |
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql18

      - run: pip install pyyaml pyodbc python-dotenv

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Gate 2 action
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
        run: python pipeline/gate2_dispatch.py "${{ inputs.action }}" "${{ inputs.cr_number }}" --approver "${{ inputs.approver }}"
